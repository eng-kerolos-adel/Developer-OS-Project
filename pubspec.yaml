name: developer_os
description: Developer OS - Your Personal Developer Command Center
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  go_router: ^13.2.0
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_storage: ^11.6.10
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  blur: ^3.1.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_svg: ^2.0.10+1
  uuid: ^4.3.3
  intl: ^0.20.2
  url_launcher: ^6.2.5
  font_awesome_flutter: ^10.7.0
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  reorderable_grid_view: ^2.2.8
  flutter_staggered_grid_view: ^0.7.0
  dotted_border: ^2.1.0
  animations: ^2.0.11
  auto_size_text: ^3.0.0
  flutter_colorpicker: ^1.0.3
  flutter_secure_storage: ^9.0.0
  http: ^1.2.0
  pdf: ^3.11.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  arabic_reshaper: 0.0.1
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.2
  local_auth: ^2.3.0
  home_widget: ^0.6.0
  app_links: ^6.3.4
  firebase_crashlytics: ^3.5.7
  firebase_analytics: ^10.10.7
  firebase_performance: ^0.9.4+7
  flutter_background_service: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false

  web:
    generate: true
    image_path: "assets/icons/app-icon-old.png" # مسار الصورة للويب
    background_color: "#1A1A1A" # لون خلفية الـ PWA
    theme_color: "#1A1A1A"

  windows:
    generate: true
    image_path: "assets/icons/app-icon-old.png" # مسار الصورة للويندوز
    icon_size: 256 # مقاس الأيقونة المفضل للويندوز

  # الصورة الافتراضية للنسخ القديمة
  image_path: "assets/icons/app-icon-old.png"

  # ميزات الأندرويد الحديث (Adaptive Icons)
  adaptive_icon_background: "assets/icons/app-icon-back.png"
  adaptive_icon_foreground: "assets/icons/app-icon-logo.png"

  # ميزة الأيقونات أحادية اللون (أندرويد 13+)
  adaptive_icon_monochrome: "assets/icons/app-icon-logo.png"

  # الأيقونة الخاصة بالإشعارات (التي كنا نتحدث عنها)
  monochrome_white_icon: "assets/icons/app-icon-logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Light.ttf
          weight: 300
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
